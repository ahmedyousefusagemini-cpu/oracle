name: Oracle ARM Retry

on:
  workflow_dispatch:

jobs:
  retry:
    runs-on: ubuntu-latest
    timeout-minutes: 3600
    env:
      OCI_CLI_USER: ${{secrets.OCI_USER_OCID}}
      OCI_CLI_FINGERPRINT: ${{secrets.OCI_FINGERPRINT}} 
      OCI_CLI_TENANCY: ${{secrets.OCI_TENANCY_OCID}} 
      OCI_CLI_KEY_CONTENT: ${{secrets.OCI_API_KEY}} 
      OCI_CLI_REGION: uk-london-1

    steps:
      - name: Install OCI CLI
        run: pip install oci-cli

      - name: Test OCI CLI
        run: oci iam region list --auth api_key --output table

      - name: Retry Instance Creation
        run: |
          set +e
          echo "ssh-rsa  rsa-key-20260413" > /tmp/ssh_key.pub
          ATTEMPT=0
          while true; do
            for AD in "TmZB:UK-LONDON-1-AD-1" "TmZB:UK-LONDON-1-AD-3"; do
              ATTEMPT=$((ATTEMPT + 1))
              echo "$(date) - Attempt #$ATTEMPT using $AD..."
              RESULT=$(oci compute instance launch --availability-domain "$AD" --compartment-id "ocid1.tenancy.oc1..aaaaaaaava7zhydntaf3ad2el4m4x7awm2dvf4f2pxrm7ytle6zmhqkkpteq" --shape "VM.Standard.A1.Flex" --shape-config '{"ocpus":1,"memoryInGBs":6}' --display-name "n8n-server" --image-id "ocid1.image.oc1.uk-london-1.aaaaaaaarlzudoyt5g2ofuqhmkak5bcosbqstkcutdpx3eva5dc7t4v5wgpq" --subnet-id "ocid1.subnet.oc1.uk-london-1.aaaaaaaa7a5ggxpnjqvwqo4c7qmaxhhvb3x7filymmnoso6vadn5sbhdiqia" --ssh-authorized-keys-file /tmp/ssh_key.pub --assign-public-ip true 2>&1) || true
              echo "$RESULT"
              if echo "$RESULT" | grep -q "PROVISIONING"; then
                echo "SUCCESS on $AD!"
                exit 0
              fi
              echo "Out of capacity on $AD. Next in 60s..."
              sleep 30
            done
          done
