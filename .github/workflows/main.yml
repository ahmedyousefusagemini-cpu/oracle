name: Oracle ARM Retry

on:
  workflow_dispatch:
  schedule:
    - cron: '8 */6 * * *'

jobs:
  retry:
    runs-on: ubuntu-latest
    timeout-minutes: 3600
    env:
      OCI_CLI_USER: ${{secrets.OCI_USER_OCID}}
      OCI_CLI_FINGERPRINT: ${{secrets.OCI_FINGERPRINT}} 
      OCI_CLI_TENANCY: ${{secrets.OCI_TENANCY_OCID}} 
      OCI_CLI_KEY_CONTENT: ${{secrets.OCI_API_KEY}} 
      OCI_CLI_REGION: uk-london-1

    steps:
      - name: Install OCI CLI
        run: pip install oci-cli

      - name: Test OCI CLI
        run: oci iam region list --auth api_key --output table

      - name: Check if instance already exists
        id: check
        run: |
          set +e
          EXISTING=$(oci compute instance list --compartment-id "ocid1.tenancy.oc1..aaaaaaaava7zhydntaf3ad2el4m4x7awm2dvf4f2pxrm7ytle6zmhqkkpteq" --display-name "n8n-server" --lifecycle-state RUNNING --query "data[0].id" --raw-output 2>&1) || true
          if [ -n "$EXISTING" ] && [ "$EXISTING" != "None" ] && [ "$EXISTING" != "" ]; then
            echo "Instance already exists: $EXISTING"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "No running instance found. Will attempt to create."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Retry Instance Creation
        run: |
          set +e
          echo "ssh-rsa  rsa-key-20260413" > /tmp/ssh_key.pub
          ATTEMPT=0
          while true; do
            for AD in "TmZB:UK-LONDON-1-AD-1" "TmZB:UK-LONDON-1-AD-3"; do
              ATTEMPT=$((ATTEMPT + 1))
              echo "$(date) - Attempt #$ATTEMPT using $AD..."
              RESULT=$(oci compute instance launch \
                --availability-domain "$AD" \
                --compartment-id "ocid1.tenancy.oc1..aaaaaaaava7zhydntaf3ad2el4m4x7awm2dvf4f2pxrm7ytle6zmhqkkpteq" \
                --shape "VM.Standard.A1.Flex" \
                --shape-config '{"ocpus":1,"memoryInGBs":6}' \
                --display-name "vps" \
                --image-id "ocid1.image.oc1.uk-london-1.aaaaaaaarlzudoyt5g2ofuqhmkak5bcosbqstkcutdpx3eva5dc7t4v5wgpq" \
                --subnet-id "ocid1.subnet.oc1.uk-london-1.aaaaaaaa7a5ggxpnjqvwqo4c7qmaxhhvb3x7filymmnoso6vadn5sbhdiqia" \
                --ssh-authorized-keys-file /tmp/ssh_key.pub \
                --assign-public-ip true \
                --is-pv-encryption-in-transit-enabled true \
                --source-details '{"sourceType":"image","imageId":"ocid1.image.oc1.uk-london-1.aaaaaaaarlzudoyt5g2ofuqhmkak5bcosbqstkcutdpx3eva5dc7t4v5wgpq","bootVolumeSizeInGBs":100,"bootVolumeVpusPerGB":120}' \
                --availability-config '{"recoveryAction":"RESTORE_INSTANCE"}' \
                --agent-config '{"isManagementDisabled":false,"isMonitoringDisabled":false,"pluginsConfig":[{"name":"Vulnerability Scanning","desiredState":"DISABLED"},{"name":"OS Management Hub Agent","desiredState":"DISABLED"},{"name":"Management Agent","desiredState":"DISABLED"},{"name":"Custom Logs Monitoring","desiredState":"ENABLED"},{"name":"Compute RDMA GPU Monitoring","desiredState":"DISABLED"},{"name":"Compute Instance Monitoring","desiredState":"ENABLED"},{"name":"Compute HPC RDMA Auto-Configuration","desiredState":"DISABLED"},{"name":"Compute HPC RDMA Authentication","desiredState":"DISABLED"},{"name":"Cloud Guard Workload Protection","desiredState":"ENABLED"},{"name":"Block Volume Management","desiredState":"DISABLED"},{"name":"Bastion","desiredState":"DISABLED"}]}' \
                --instance-options '{"areLegacyImdsEndpointsDisabled":false}' \
                2>&1) || true
              echo "$RESULT"
              if echo "$RESULT" | grep -q "PROVISIONING"; then
                echo "SUCCESS on $AD!"
                exit 0
              fi
              echo "Out of capacity on $AD. Next in 30s..."
              sleep 30
            done
          done
