name: Oracle ARM Retry

on:
  workflow_dispatch:

jobs:
  retry:
    runs-on: ubuntu-latest
    timeout-minutes: 3600
    env:
      OCI_CLI_USER: ${{secrets.OCI_USER_OCID}}
      OCI_CLI_FINGERPRINT: ${{secrets.OCI_FINGERPRINT}} 
      OCI_CLI_TENANCY: ${{secrets.OCI_TENANCY_OCID}} 
      OCI_CLI_KEY_CONTENT: ${{secrets.OCI_API_KEY}} 
      OCI_CLI_REGION: uk-london-1
      COMPARTMENT_ID: ocid1.tenancy.oc1..aaaaaaaava7zhydntaf3ad2el4m4x7awm2dvf4f2pxrm7ytle6zmhqkkpteq
      SUBNET_ID: ocid1.subnet.oc1.uk-london-1.aaaaaaaa7a5ggxpnjqvwqo4c7qmaxhhvb3x7filymmnoso6vadn5sbhdiqia
      IMAGE_ID: ocid1.image.oc1.uk-london-1.aaaaaaaarlzudoyt5g2ofuqhmkak5bcosbqstkcutdpx3eva5dc7t4v5wgpq
      SSH_PUBLIC_KEY: "ssh-rsa  rsa-key-20260413"

    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install OCI SDK
        run: pip install --quiet oci

      - name: Diagnose secret formats
        run: |
          python - <<'PY'
          import os, re
          T = os.environ["OCI_CLI_TENANCY"]
          U = os.environ["OCI_CLI_USER"]
          F = os.environ["OCI_CLI_FINGERPRINT"]
          K = os.environ["OCI_CLI_KEY_CONTENT"]
          ok_t = bool(re.match(r"^ocid1\.tenancy\.oc[0-9]+\..+$", T))
          ok_u = bool(re.match(r"^ocid1\.user\.oc[0-9]+\..+$", U))
          ok_f = bool(re.match(r"^([0-9a-f]{2}:){15}[0-9a-f]{2}$", F))
          ok_k = ("BEGIN" in K) and ("END" in K)
          print(f"tenancy     ok={ok_t} len={len(T)}")
          print(f"user        ok={ok_u} len={len(U)}")
          print(f"fingerprint ok={ok_f} len={len(F)}")
          print(f"key         ok={ok_k} len={len(K)} lines={K.count(chr(10))}")
          if not all([ok_t, ok_u, ok_f, ok_k]):
              raise SystemExit("One or more secrets have wrong format. Re-enter in GitHub → Settings → Secrets.")
          PY

      - name: Check if instance already exists
        id: check
        run: |
          python - <<'PY'
          import os, oci

          cfg = {
              "user":        os.environ["OCI_CLI_USER"],
              "fingerprint": os.environ["OCI_CLI_FINGERPRINT"],
              "tenancy":     os.environ["OCI_CLI_TENANCY"],
              "region":      os.environ["OCI_CLI_REGION"],
              "key_content": os.environ["OCI_CLI_KEY_CONTENT"],
          }
          client = oci.core.ComputeClient(cfg)

          r = client.list_instances(
              os.environ["COMPARTMENT_ID"],
              display_name="n8n-server",
              lifecycle_state="RUNNING",
          )
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              if r.data:
                  print(f"Instance already running: {r.data[0].id}")
                  f.write("skip=true\n")
              else:
                  print("No running instance. Will attempt to create.")
                  f.write("skip=false\n")
          PY

      - name: Retry instance creation (parallel ADs)
        if: steps.check.outputs.skip != 'true'
        run: |
          python - <<'PY'
          import os, time, itertools, threading, oci
          from oci.core.models import (
              LaunchInstanceDetails,
              InstanceSourceViaImageDetails,
              CreateVnicDetails,
              LaunchInstanceShapeConfigDetails,
              LaunchInstanceAvailabilityConfigDetails,
              LaunchInstanceAgentConfigDetails,
              InstanceAgentPluginConfigDetails,
              InstanceOptions,
          )

          cfg = {
              "user":        os.environ["OCI_CLI_USER"],
              "fingerprint": os.environ["OCI_CLI_FINGERPRINT"],
              "tenancy":     os.environ["OCI_CLI_TENANCY"],
              "region":      os.environ["OCI_CLI_REGION"],
              "key_content": os.environ["OCI_CLI_KEY_CONTENT"],
          }
          client = oci.core.ComputeClient(cfg)
          client.base_client.session.headers.update({"Connection": "keep-alive"})

          SSH_KEY = os.environ["SSH_PUBLIC_KEY"]

          plugins = [
              InstanceAgentPluginConfigDetails(name="Custom Logs Monitoring",              desired_state="ENABLED"),
              InstanceAgentPluginConfigDetails(name="Compute Instance Monitoring",         desired_state="ENABLED"),
              InstanceAgentPluginConfigDetails(name="Cloud Guard Workload Protection",     desired_state="ENABLED"),
              InstanceAgentPluginConfigDetails(name="Vulnerability Scanning",              desired_state="DISABLED"),
              InstanceAgentPluginConfigDetails(name="OS Management Hub Agent",             desired_state="DISABLED"),
              InstanceAgentPluginConfigDetails(name="Management Agent",                    desired_state="DISABLED"),
              InstanceAgentPluginConfigDetails(name="Compute RDMA GPU Monitoring",         desired_state="DISABLED"),
              InstanceAgentPluginConfigDetails(name="Compute HPC RDMA Auto-Configuration", desired_state="DISABLED"),
              InstanceAgentPluginConfigDetails(name="Compute HPC RDMA Authentication",     desired_state="DISABLED"),
              InstanceAgentPluginConfigDetails(name="Block Volume Management",             desired_state="DISABLED"),
              InstanceAgentPluginConfigDetails(name="Bastion",                             desired_state="DISABLED"),
          ]

          def build_details(ad):
              return LaunchInstanceDetails(
                  availability_domain=ad,
                  compartment_id=os.environ["COMPARTMENT_ID"],
                  shape="VM.Standard.A1.Flex",
                  shape_config=LaunchInstanceShapeConfigDetails(ocpus=1, memory_in_gbs=6),
                  display_name="vps",
                  create_vnic_details=CreateVnicDetails(
                      subnet_id=os.environ["SUBNET_ID"],
                      assign_public_ip=True,
                  ),
                  metadata={"ssh_authorized_keys": SSH_KEY},
                  source_details=InstanceSourceViaImageDetails(
                      image_id=os.environ["IMAGE_ID"],
                      boot_volume_size_in_gbs=100,
                      boot_volume_vpus_per_gb=120,
                  ),
                  is_pv_encryption_in_transit_enabled=True,
                  availability_config=LaunchInstanceAvailabilityConfigDetails(
                      recovery_action="RESTORE_INSTANCE",
                  ),
                  agent_config=LaunchInstanceAgentConfigDetails(
                      is_management_disabled=False,
                      is_monitoring_disabled=False,
                      plugins_config=plugins,
                  ),
                  instance_options=InstanceOptions(are_legacy_imds_endpoints_disabled=False),
              )

          ADS = ["TmZB:UK-LONDON-1-AD-1", "TmZB:UK-LONDON-1-AD-3"]
          stop = threading.Event()
          lock = threading.Lock()
          counter = itertools.count(1)
          success = {"ok": False}

          def worker(ad):
              details = build_details(ad)
              while not stop.is_set():
                  n = next(counter)
                  t0 = time.time()
                  try:
                      r = client.launch_instance(details)
                      with lock:
                          print(f"✅ SUCCESS on {ad} (attempt #{n}): {r.data.id}")
                      success["ok"] = True
                      stop.set()
                      return
                  except oci.exceptions.ServiceError as e:
                      msg = (e.message or "").splitlines()[0][:140]
                      with lock:
                          print(f"❌ #{n} | {ad} | {e.status} {e.code} | {msg} | {time.strftime('%H:%M:%S')} | {time.time()-t0:.1f}s")
                      if e.status == 429 or "TooManyRequests" in (e.code or ""):
                          time.sleep(30)
                      elif e.status and e.status >= 500:
                          time.sleep(10)
                      elif "LimitExceeded" in (e.code or ""):
                          with lock:
                              print(f"🛑 Quota limit on {ad}: {e.code}")
                          stop.set()
                          return
                      else:
                          time.sleep(5)
                  except Exception as ex:
                      with lock:
                          print(f"⚠️  #{n} | {ad} | unexpected: {ex}")
                      time.sleep(15)

          threads = [threading.Thread(target=worker, args=(ad,), daemon=True) for ad in ADS]
          for t in threads: t.start()
          for t in threads: t.join()

          if not success["ok"]:
              raise SystemExit("No instance was created.")
          PY
