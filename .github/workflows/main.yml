name: Oracle ARM Retry

on:
  workflow_dispatch:

jobs:
  retry:
    runs-on: ubuntu-latest
    timeout-minutes: 3600

    steps:
      - name: Install OCI CLI
        run: pip install oci-cli

      - name: Setup OCI Config
        run: |
          mkdir -p ~/.oci
          printf '%s\n' "$OCI_PRIVATE_KEY" > ~/.oci/key.pem
          chmod 600 ~/.oci/key.pem
          printf '[DEFAULT]\nuser=%s\nfingerprint=%s\ntenancy=%s\nregion=uk-london-1\nkey_file=/home/runner/.oci/key.pem\n' "$OCI_USER" "$OCI_FP" "$OCI_TENANCY" > ~/.oci/config
          chmod 600 ~/.oci/config
          oci iam region list --output table
        env:
          OCI_PRIVATE_KEY: $ secrets.OCI_API_KEY 
          OCI_USER: $ secrets.OCI_USER_OCID 
          OCI_FP: $ secrets.OCI_FINGERPRINT 
          OCI_TENANCY: $ secrets.OCI_TENANCY_OCID 

      - name: Retry Instance Creation
        run: |
          set +e
          SSH_KEY="ssh-rsa  rsa-key-20260413"
          ATTEMPT=0
          while true; do
            for AD in "TmZB:UK-LONDON-1-AD-1" "TmZB:UK-LONDON-1-AD-3"; do
              ATTEMPT=$((ATTEMPT + 1))
              echo "$(date) - Attempt #$ATTEMPT using $AD..."
              RESULT=$(oci compute instance launch --availability-domain "$AD" --compartment-id "ocid1.tenancy.oc1..aaaaaaaava7zhydntaf3ad2el4m4x7awm2dvf4f2pxrm7ytle6zmhqkkpteq" --shape "VM.Standard.A1.Flex" --shape-config '{"ocpus":1,"memoryInGBs":6}' --display-name "n8n-server" --image-id "ocid1.image.oc1.uk-london-1.aaaaaaaarlzudoyt5g2ofuqhmkak5bcosbqstkcutdpx3eva5dc7t4v5wgpq" --subnet-id "ocid1.subnet.oc1.uk-london-1.aaaaaaaa7a5ggxpnjqvwqo4c7qmaxhhvb3x7filymmnoso6vadn5sbhdiqia" --ssh-authorized-keys "$SSH_KEY" --assign-public-ip true 2>&1) || true
              echo "$RESULT"
              if echo "$RESULT" | grep -q "PROVISIONING"; then
                echo "========================================="
                echo "SUCCESS on $AD! Instance is being created!"
                echo "========================================="
                exit 0
              fi
              echo "Out of capacity on $AD. Trying next in 60s..."
              sleep 60
            done
          done
