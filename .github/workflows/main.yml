name: "🔁 Oracle ARM Instance Retry"

on:
  workflow_dispatch:

jobs:
  retry:
    runs-on: ubuntu-latest
    timeout-minutes: 3600

    steps:
      - name: "Install OCI CLI"
        run: |
          pip install oci-cli

      - name: "Setup OCI Config"
        env:
          OCI_KEY: $ secrets.OCI_API_KEY 
          OCI_USER: $ secrets.OCI_USER_OCID 
          OCI_FINGERPRINT: $ secrets.OCI_FINGERPRINT 
          OCI_TENANCY: $ secrets.OCI_TENANCY_OCID 
        run: |
          mkdir -p ~/.oci
          echo "$OCI_KEY" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          cat > ~/.oci/config << EOF
          [DEFAULT]
          user=$OCI_USER
          fingerprint=$OCI_FINGERPRINT
          tenancy=$OCI_TENANCY
          region=uk-london-1
          key_file=~/.oci/oci_api_key.pem
          EOF

      - name: "Retry Instance Creation (AD-1 & AD-3)"
        run: |
          SSH_KEY="ssh-rsa  rsa-key-20260413"

          ADS=("TmZB:UK-LONDON-1-AD-1" "TmZB:UK-LONDON-1-AD-3")
          ATTEMPT=0

          while true; do
            # Alternate between AD-1 and AD-3
            AD="${ADS[$((ATTEMPT % 2))]}"
            ATTEMPT=$((ATTEMPT + 1))

            echo "$(date) - Attempt #$ATTEMPT using $AD..."

            RESULT=$(oci compute instance launch \
              --availability-domain "$AD" \
              --compartment-id "ocid1.tenancy.oc1..aaaaaaaava7zhydntaf3ad2el4m4x7awm2dvf4f2pxrm7ytle6zmhqkkpteq" \
              --shape "VM.Standard.A1.Flex" \
              --shape-config '{"ocpus":1,"memoryInGBs":6}' \
              --display-name "n8n-server" \
              --image-id "ocid1.image.oc1.uk-london-1.aaaaaaaarlzudoyt5g2ofuqhmkak5bcosbqstkcutdpx3eva5dc7t4v5wgpq" \
              --subnet-id "ocid1.subnet.oc1.uk-london-1.aaaaaaaa7a5ggxpnjqvwqo4c7qmaxhhvb3x7filymmnoso6vadn5sbhdiqia" \
              --ssh-authorized-keys "$SSH_KEY" \
              --assign-public-ip true \
              2>&1)

            echo "$RESULT"

            if echo "$RESULT" | grep -q "PROVISIONING"; then
              echo ""
              echo "========================================="
              echo "✅ SUCCESS on $AD! Instance is being created!"
              echo "========================================="
              break
            fi

            echo "❌ Out of capacity on $AD. Trying other AD in 60s..."
            echo ""
            sleep 60
          done
